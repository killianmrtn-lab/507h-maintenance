<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>507h — On revient bientôt</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #080808;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      overflow: hidden;
    }

    .content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 52px;
      padding: 40px 20px;
    }

    .logo svg {
      width: 160px;
      height: auto;
      display: block;
    }

    .text-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
    }

    .headline {
      font-size: clamp(16px, 3vw, 24px);
      font-weight: 300;
      letter-spacing: 0.05em;
      color: rgba(255, 255, 255, 0.88);
      white-space: nowrap;
    }

    .line {
      width: 1px;
      height: 48px;
      background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.25), transparent);
    }

    .contact {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .contact-label {
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.3);
      font-weight: 400;
    }

    .contact a {
      font-size: 14px;
      letter-spacing: 0.06em;
      color: rgba(255, 255, 255, 0.55);
      text-decoration: none;
      font-weight: 300;
      transition: color 0.2s;
    }
    .contact a:hover { color: rgba(255, 255, 255, 0.9); }

    @media (max-width: 500px) {
      .headline { white-space: normal; text-align: center; font-size: 15px; }
      .logo svg { width: 120px; }
    }
  </style>
</head>
